<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QA Test Recorder</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        padding: 1rem;
        min-width: 240px;
      }
      .status {
        margin-bottom: 0.75rem;
        font-size: 0.875rem;
        color: #666;
      }
      button {
        display: block;
        width: 100%;
        margin-bottom: 0.5rem;
        padding: 0.5rem 0.75rem;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <p class="status" id="status">Stopped</p>
    <button type="button" id="startBtn">Start Recording</button>
    <button type="button" id="stopBtn">Stop Recording</button>
    <button type="button" id="exportBtn">Export JSON</button>
    <script type="module" src="dist/panel.js"></script>
  </body>
</html>
