  <!-- Nodes (behind mask) -->
  <circle cx="256" cy="60" r="30" fill="white" opacity="0.5" />
  <circle cx="256" cy="300" r="30" fill="white" opacity="0.5" />
  <circle cx="256" cy="460" r="30" fill="white" opacity="0.5" />

  <!-- Playwright-inspired Mask (visible, minimal) -->
